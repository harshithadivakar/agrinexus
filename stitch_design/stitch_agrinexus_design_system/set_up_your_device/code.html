<!-- Note: BottomNavBar and FAB are suppressed for this transactional setup flow as per Shared Components Logic -->
<script>
        // Micro-interaction for the next button
        const nextButton = document.querySelector('button.bg-primary');
        nextButton.addEventListener('click', function() {
            // Simulated loading state
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                // In a real app, this would navigate to step 2
                this.innerHTML = 'Next: Add Water <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
            }, 800);
        });

        // Atmospheric micro-interaction for the image container
        const imageCard = document.querySelector('main > div.relative');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            imageCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>

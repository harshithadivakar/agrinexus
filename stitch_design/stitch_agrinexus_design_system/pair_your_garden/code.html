<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    /* Viewfinder corner accents */
    .viewfinder-corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #82d8a3; /* inverse-primary / light brand highlight */
      border-width: 4px;
    }
    
    .scanning-line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6DDBA0, transparent);
      position: absolute;
      top: 0;
      animation: scan 3s linear infinite;
      box-shadow: 0 0 15px #6DDBA0;
    }

    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    .shimmer {
      background: linear-gradient(90deg, #f7faf6 25%, #ecefeb 50%, #f7faf6 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-lg min-h-screen flex flex-col">
<!-- TopAppBar (Suppressed navigation, Task-focused) -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-dark-surface flex items-center px-screen-edge h-touch-target transition-colors duration-200">
<button aria-label="Go back" class="mr-4 p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-screen-title-mobile text-screen-title-mobile text-primary dark:text-dark-brand-primary">Pair Your Garden</h1>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-screen-edge pt-24 pb-12 overflow-hidden">
<!-- Viewfinder Container -->
<div class="relative w-full max-w-[320px] aspect-square bg-surface-container-highest rounded-xl overflow-hidden shadow-sm">
<!-- Background Placeholder for Camera Feed -->
<div class="w-full h-full bg-cover bg-center grayscale-[0.2] opacity-80" data-alt="A high-resolution first-person view through a smartphone camera aiming at a sleek white AgriNexus hydroponic smart garden. The scene is bright and airy with natural sunlight streaming through a nearby window. The background shows a modern kitchen with clean lines and soft green accents. A subtle bokeh effect emphasizes the focus on the garden unit's surface where a QR code is expected to be found." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuClgeEOMlyszzCUErffGIrHeRWEoOFU8s_pqgb84OtuY6H5bPSwiL4GPFZXQuIzvWDlC7OkRPy0jM6lV1VNGwMfmCztR0BloXadhXmZO-mV8nFhbQ6V70RiIp5wgBvh04z6mDe4leLXm7VwplBI2zxCyGueU6BPe-FUhTmBUtVO1uQi9yKySD_37qCXKdXBbFQ-ErTahtmVyV3-ZIx6pQ20cjLuD-BWgM6h1037MqbbcomJ1D9hauga-80UM0kemn4U4zxofnI0dQoh')"></div>
<!-- Viewfinder Overlay Elements -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- Viewfinder Box -->
<div class="relative w-64 h-64 border-2 border-white/30 rounded-lg">
<!-- Corners -->
<div class="viewfinder-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="viewfinder-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="viewfinder-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="viewfinder-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Animated Scanning Line -->
<div class="scanning-line"></div>
</div>
</div>
<!-- Flash Toggle -->
<button class="absolute top-4 right-4 bg-black/30 backdrop-blur-md p-3 rounded-full text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</div>
<!-- Instruction Text -->
<div class="mt-xl text-center max-w-[280px]">
<p class="font-body-lg text-on-surface-variant leading-relaxed">
        Scan the QR code located on the back or bottom of your <span class="font-bold text-primary">Agrinexus</span> device.
      </p>
</div>
<!-- Actions Section -->
<div class="mt-auto w-full max-w-[320px] flex flex-col gap-sm items-center">
<!-- Main Action -->
<button class="w-full bg-primary text-on-primary font-label-button text-label-button h-[52px] rounded-full shadow-sm hover:opacity-90 active:scale-95 transition-all">
        Scan Code
      </button>
<!-- Secondary Help Link -->
<button class="h-touch-target flex items-center justify-center font-label-button text-primary hover:underline">
        Where is my QR code?
      </button>
</div>
</main>
<!-- Illustration Section (Subtle Contextual Visual) -->
<div class="px-screen-edge pb-10">
<div class="bg-surface-container-low rounded-xl p-md flex items-center gap-md border border-border-subtle">
<div class="w-12 h-12 bg-primary-container flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-on-primary-container">qr_code_2</span>
</div>
<div>
<h4 class="font-section-title text-body-sm font-semibold">Automatic Pairing</h4>
<p class="font-caption text-on-surface-variant">Keep your phone close to the device for faster discovery.</p>
</div>
</div>
</div>
<!-- Bottom Navigation is suppressed per instructions for task-focused onboarding -->
<script>
    // Micro-interaction for the back button
    document.querySelector('header button').addEventListener('click', () => {
      window.history.back();
    });

    // Simulate "Where is my QR code" modal or behavior
    document.querySelector('.text-primary.hover\\:underline').addEventListener('click', () => {
      alert("Look for a small square sticker with a black and white pixel pattern. It's usually near the power input or on the base of the water reservoir.");
    });

    // Simple interaction for the scan button
    const scanBtn = document.querySelector('button.bg-primary');
    scanBtn.addEventListener('click', () => {
      scanBtn.innerHTML = '<span class="flex items-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Scanning...</span>';
      setTimeout(() => {
        scanBtn.textContent = "Code Found!";
        scanBtn.classList.replace('bg-primary', 'bg-status-info');
      }, 2000);
    });
  </script>

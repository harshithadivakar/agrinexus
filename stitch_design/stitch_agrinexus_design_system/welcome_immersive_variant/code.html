<style>
        body {
            background-color: #000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .hero-overlay {
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 50%, rgba(24,28,26,0.95) 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="font-body-lg">
<!-- Immersive Background -->
<div class="fixed inset-0 w-full h-full z-0">
<img alt="AgriNexus Countertop Garden" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQWdNc7gmLVKTtiWxp8JTqtqVoZx8oeokM3suGjRscEE7PEkMX_N37cyPRXcehoK5BRMYeqdqwxMenlc_7RzGUNC3gLGH-37XI9IbGJsfesESar73L8j6FgMT1tf94Dlr0bIMhG4GtKnlI75WfCkjLwLCwKQCwzQy04bADuMJ5j22kuzS25m69PYxhkmOCppy1ZWHS35rULCr5j-rjTtv3mwnIQ0thMPybymo5gNRSjj_awLBtHBDb1gmwqo9X5b3u7wNGnRaPjpdJ"/>
<div class="absolute inset-0 hero-overlay"></div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-screen-edge h-touch-target bg-gradient-to-b from-black/40 to-transparent">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-dark-brand-primary text-[28px]">potted_plant</span>
<span class="font-screen-title-mobile text-[22px] font-extrabold tracking-tight text-white">AgriNexus</span>
</div>
<div class="w-touch-target h-touch-target flex items-center justify-end">
<button class="text-white/80 hover:bg-white/10 transition-colors duration-200 p-2 rounded-full active:opacity-80">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Content Overlay -->
<main class="relative z-10 min-h-screen flex flex-col justify-end">
<div class="glass-panel w-full pt-xxl pb-xl px-screen-edge rounded-t-[32px]">
<div class="max-w-md mx-auto w-full">
<div class="space-y-sm mb-xxl text-center">
<h1 class="font-screen-title text-screen-title text-white leading-[1.1] mb-md drop-shadow-md">
                        Grow fresh herbs at your fingertips.
                    </h1>
<p class="font-body-lg text-white/90 max-w-[300px] mx-auto">
                        The aesthetic countertop garden for your home.
                    </p>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-md w-full">
<button class="w-full h-[60px] bg-dark-brand-primary text-dark-surface font-label-button text-lg rounded-full shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm font-bold">
                        Create My Account
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
<button class="w-full h-[60px] border border-white/30 text-white font-label-button text-lg rounded-full active:bg-white/10 transition-all duration-200 backdrop-blur-sm">
                        Sign In
                    </button>
</div>
<!-- Integrated Tagline -->
<div class="mt-xxl text-center">
<p class="font-caption text-caption text-white/60 flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[16px] text-dark-brand-primary">eco</span>
                        Sustainable urban living made simple
                    </p>
</div>
</div>
</div>
</main>
<script>
        // Haptic-like interaction feedback for primary buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
</body></html>

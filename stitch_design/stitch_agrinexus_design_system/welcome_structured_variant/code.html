<span class="font-screen-title-mobile text-[24px] font-extrabold tracking-tight text-primary">AgriNexus</span>

<button class="text-on-surface-variant p-2 rounded-full active:bg-surface-container-low transition-colors">

<div class="space-y-md">
<h1 class="font-screen-title-mobile text-screen-title-mobile text-text-primary leading-tight">
                    Grow fresh herbs at your fingertips.
                </h1>
<div class="space-y-sm">
<h2 class="font-section-title text-section-title text-primary">Kitchen Native™ System</h2>
<p class="font-body-lg text-on-surface-variant leading-relaxed">

</div>

</button>
<button class="w-full h-[56px] bg-surface-container text-primary font-label-button text-label-button rounded-full active:scale-[0.98] hover:bg-surface-container-high transition-all">

</div>

<script>
        // Haptic-like interaction feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
